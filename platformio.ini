[env:waveshare-esp32-s3-touch-lcd-154]
platform = espressif32
board = waveshare-esp32-s3-touch-lcd-154
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_unflags = 
    -std=gnu++11
build_flags = 
    -std=gnu++17
    -Wall
lib_deps =
    lovyan03/LovyanGFX
    tzapu/WiFiManager
    mathieucarbou/ESP Async WebServer
    mathieucarbou/AsyncTCP
    bblanchon/ArduinoJson
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12
